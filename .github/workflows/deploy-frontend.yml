name: Deploy frontend naar AWS S3

on:
  push:
    branches:
      - master
    paths:
      - 'ollander-front/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build en deploy naar S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Stel Node 24 in
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ollander-front/package-lock.json

      - name: Installeer afhankelijkheden
        working-directory: ollander-front
        run: npm ci

      - name: Genereer statische site
        working-directory: ollander-front
        run: npm run generate

      - name: Configureer AWS-credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.FRONT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.FRONT_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.FRONT_AWS_REGION }}

      - name: Sync statische bestanden naar S3 (lange cache)
        run: |
          aws s3 sync ollander-front/.output/public/ s3://${{ secrets.FRONT_S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML-bestanden naar S3 (geen cache)
        run: |
          aws s3 sync ollander-front/.output/public/ s3://${{ secrets.FRONT_S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalideer CloudFront-cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.FRONT_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
